# This is a basic workflow to help you get started with Actions
# This file was contributed by Carlos Parada and Yamel Senih from ERP Consultores y Asociados, C.A

name: Publish With gradle to maven central

# Controls when the action will run. 
on:
  release:
    types: 
      - published

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:

  publish-github:
    name: Publish Project (Github)
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Java JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-package: 'jdk'
          java-version: '8'
          architecture: x64

      - name: Download dependencies
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: 7.6
          arguments: refreshDependences
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build with Gradle
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: 7.6
          arguments: publish
        env:
          ORG_GRADLE_PROJECT_deployVersion: ${{ github.event.release.tag_name }}
          ORG_GRADLE_PROJECT_deployPublishUrl: https://maven.pkg.github.com/erpcya/LVE
          ORG_GRADLE_PROJECT_deployUsername: "${{ github.actor }}"
          ORG_GRADLE_PROJECT_deployPassword: "${{ secrets.GITHUB_TOKEN }}"