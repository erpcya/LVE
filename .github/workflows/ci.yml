# This is a basic workflow to help you get started with Actions
# This file was contributed by Carlos Parada and Yamel Senih from ERP Consultores y Asociados, C.A

name: Continuous Integration with Gradle

# Controls when the action will run.
on:
  push:
    branches:
      - '*'
      - '*/*'
      - '**'
  pull_request:
    branches:
      - '*'
      - '*/*'
      - '**'

jobs:

  build-ci:
    name: Build Project
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Java JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-package: 'jdk'
          java-version: '8'
          architecture: x64

      - name: Download dependencies
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: 7.6
          arguments: refreshDependences

      - name: Build with Gradle
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: 7.6
          arguments: build
        env:
          ADEMPIERE_LIBRARY_VERSION: 'build'